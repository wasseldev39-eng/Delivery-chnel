<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واصل ديليفري  | Wassel Delivery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-purple: #6c5ce7;
            --dark-purple: #4834d4;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* قسم الهيدر - Hero Section */
        .hero-telegram {
            width: 100%;
            background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple));
            color: white;
            padding: 50px 20px 60px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
            margin-bottom: 40px;
        }

        /* تنسيق اللوجو */
        .logo {
            width: 110px;
            height: auto;
            background: white;
            padding: 12px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .hero-telegram h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .hero-telegram p { opacity: 0.9; margin-bottom: 25px; font-size: 1.1rem; }

        .btn-join {
            background: var(--white);
            color: var(--dark-purple);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-join:hover {
            transform: scale(1.05);
            background: #eee1ff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px 40px;
        }

        .info-title {
            text-align: center;
            margin-bottom: 20px;
            color: var(--dark-purple);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .buttons-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-btn {
            background: var(--white);
            padding: 18px 25px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid rgba(108, 92, 231, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .info-btn:hover {
            background: #fdfcff;
            border-color: var(--primary-purple);
            transform: translateX(-5px);
        }

        .info-btn div {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-btn i {
            font-size: 24px;
            color: var(--primary-purple);
        }

        .info-btn .arrow {
            font-size: 16px;
            color: #ccc;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .hero-telegram { padding: 40px 15px; }
            .hero-telegram h1 { font-size: 1.5rem; }
            .info-btn { padding: 15px; }
            .logo { width: 90px; }
        }
    </style>
</head>
<body>

    <div class="hero-telegram">
        <img src="https://wasseldz.com/storage/app/public/business/2025-07-19-687bb1f5ee9c9.png" alt="Wassel Logo" class="logo">
        
        <h1>قناة المندوبين الرسمية</h1>
        <p>اشترك لتصلك أحدث الطلبات والتحديثات فوراً</p>
        <a href="https://t.me/+GrtsuCQZJvJlMmNk" class="btn-join" target="_blank">
            <i class="fab fa-telegram-plane"></i> انضم الآن للقناة
        </a>
    </div>

    <div class="container">
        <h2 class="info-title">روابط ومعلومات التواصل</h2>
        
        <div class="buttons-list">
            <a href="https://wasseldz.com/" class="info-btn" target="_blank">
                <div>
                    <i class="fas fa-globe"></i>
                    <span>الموقع الرسمي لـ واصل</span>
                </div>
                <i class="fas fa-chevron-left arrow"></i>
            </a>

            <a href="https://wa.me/213796443012" class="info-btn" target="_blank">
                <div>
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                    <span>الدعم الفني للمندوبين</span>
                </div>
                <i class="fas fa-chevron-left arrow"></i>
            </a>

            <a href="http://facebook.com/wasseldz/" class="info-btn" target="_blank">
                <div>
                    <i class="fab fa-facebook" style="color: #1877F2;"></i>
                    <span>صفحة الفيسبوك</span>
                </div>
                <i class="fas fa-chevron-left arrow"></i>
            </a>

            <a href="http://instagram.com/wasselmarketdz/" class="info-btn" target="_blank">
                <div>
                    <i class="fab fa-instagram" style="color: #E4405F;"></i>
                    <span>حساب الانستغرام</span>
                </div>
                <i class="fas fa-chevron-left arrow"></i>
            </a>
        </div>

        <footer>
            &copy; 2026 واصل ديليفري  - الجزائر
        </footer>
    </div>

</body>
</html>
